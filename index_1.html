<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守り鳥占い｜金運編 ― あなたの守り鳥は？</title>
<meta name="description" content="生年月日と名前から、あなたを守る金運の鳥がわかる無料診断。マヤ暦をもとに20タイプであなたの金運の本質を読み解きます。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2c2a3a;
    --ink-soft:#5c5870;
    --cream:#fbf7f0;
    --cream-2:#f4ecdf;
    --gold:#bd9a4e;
    --gold-soft:#d8c08a;
    --line:#e7dcc8;
    --shadow:0 18px 50px -20px rgba(60,48,30,.35);
    --maxw:680px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Zen Maru Gothic",sans-serif;
    color:var(--ink);
    background:var(--cream);
    line-height:1.85;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  /* dreamy background atmosphere */
  body::before{
    content:"";position:fixed;inset:0;z-index:-2;
    background:
      radial-gradient(1100px 700px at 80% -10%, #fdf3da 0%, transparent 55%),
      radial-gradient(900px 600px at -10% 20%, #f6eede 0%, transparent 50%),
      radial-gradient(1000px 800px at 50% 110%, #efe6d4 0%, transparent 55%),
      var(--cream);
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:-1;opacity:.4;pointer-events:none;
    background-image:radial-gradient(rgba(189,154,78,.10) 1px, transparent 1px);
    background-size:22px 22px;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}
  .mincho{font-family:"Shippori Mincho B1",serif}

  /* HERO */
  header.hero{text-align:center;padding:64px 0 30px}
  .eyebrow{
    font-family:"Shippori Mincho B1",serif;
    letter-spacing:.32em;color:var(--gold);font-size:.78rem;font-weight:700;
    margin-bottom:18px;display:inline-block;
    border-top:1px solid var(--gold-soft);border-bottom:1px solid var(--gold-soft);
    padding:7px 18px;
  }
  h1.title{
    font-family:"Shippori Mincho B1",serif;font-weight:800;
    font-size:clamp(2.1rem,7vw,3.1rem);line-height:1.3;color:var(--ink);
    letter-spacing:.04em;
  }
  h1.title .accent{color:var(--gold);position:relative}
  .lede{margin:20px auto 0;max-width:30em;color:var(--ink-soft);font-size:1rem}

  /* decorative bird mark */
  .crest{width:74px;height:74px;margin:0 auto 22px;opacity:.9}

  /* FORM CARD */
  .card{
    background:linear-gradient(180deg,#fffdf8, #fbf5ea);
    border:1px solid var(--line);border-radius:26px;
    box-shadow:var(--shadow);padding:34px 26px;margin:30px 0 14px;
    position:relative;overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;top:-40%;right:-30%;width:60%;height:120%;
    background:radial-gradient(closest-side, rgba(216,192,138,.25), transparent);
  }
  .form-title{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:1.2rem;text-align:center;margin-bottom:6px}
  .form-sub{text-align:center;color:var(--ink-soft);font-size:.85rem;margin-bottom:26px}
  label{display:block;font-weight:700;font-size:.85rem;margin:0 0 8px;color:var(--ink)}
  .field{margin-bottom:20px;position:relative;z-index:1}
  .dob{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:10px}
  select,input[type=text]{
    width:100%;font-family:inherit;font-size:1rem;color:var(--ink);
    background:#fffdf8;border:1px solid var(--line);border-radius:13px;
    padding:13px 14px;appearance:none;-webkit-appearance:none;
  }
  select:focus,input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(189,154,78,.15)}
  .hint{font-size:.74rem;color:var(--ink-soft);margin-top:7px}
  button.go{
    width:100%;margin-top:6px;cursor:pointer;border:none;
    font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:1.08rem;letter-spacing:.08em;
    color:#fff;padding:16px;border-radius:14px;
    background:linear-gradient(135deg,#caa75c,#b5893f);
    box-shadow:0 12px 26px -10px rgba(160,120,40,.7);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 16px 30px -10px rgba(160,120,40,.8)}
  button.go:active{transform:translateY(0)}

  /* RESULT */
  #result{display:none;margin-top:8px}
  #result.show{display:block;animation:rise .7s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .reveal{opacity:0;transform:translateY(14px);animation:rise .6s ease forwards}
  .r-1{animation-delay:.05s}.r-2{animation-delay:.18s}.r-3{animation-delay:.31s}
  .r-4{animation-delay:.44s}.r-5{animation-delay:.57s}.r-6{animation-delay:.7s}

  .result-hero{text-align:center;padding:10px 0 4px}
  .result-eyebrow{letter-spacing:.3em;font-size:.74rem;color:var(--ink-soft);font-weight:700}
  .bird-name{font-family:"Shippori Mincho B1",serif;font-weight:800;font-size:clamp(2rem,8vw,2.8rem);line-height:1.25;margin:6px 0 2px}
  .type-label{display:inline-block;font-size:.82rem;font-weight:700;color:#fff;padding:5px 16px;border-radius:999px;letter-spacing:.05em}

  .portrait{
    width:200px;height:200px;margin:22px auto 6px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;position:relative;
    box-shadow:0 16px 40px -16px rgba(60,48,30,.45);overflow:hidden;
  }
  .portrait .ph{font-family:"Shippori Mincho B1",serif;font-weight:800;font-size:1.5rem;color:rgba(255,255,255,.92);text-shadow:0 1px 8px rgba(0,0,0,.25);text-align:center;line-height:1.4}
  .portrait img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .glow-ring{position:absolute;inset:-10px;border-radius:50%;border:1px solid var(--gold-soft);opacity:.6}

  .block{background:#fffdf8;border:1px solid var(--line);border-radius:20px;padding:22px 22px;margin:16px 0;box-shadow:0 10px 30px -22px rgba(60,48,30,.4)}
  .block h3{font-family:"Shippori Mincho B1",serif;font-size:1.02rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:9px}
  .block h3::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold)}
  .feature{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px dashed var(--line);font-weight:500}
  .feature:last-child{border-bottom:none}
  .check{flex:0 0 22px;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;margin-top:3px}
  .guardian{font-family:"Shippori Mincho B1",serif;font-style:italic;font-size:1.06rem;line-height:1.9;text-align:center;color:var(--ink);background:linear-gradient(180deg,#fff8e9,#fdf2d8);border:1px solid var(--gold-soft);border-radius:20px;padding:26px 22px;margin:16px 0;position:relative}
  .guardian::before{content:"\201C";font-family:serif;font-size:3rem;color:var(--gold-soft);position:absolute;top:2px;left:16px;line-height:1}
  .action{font-weight:500}
  .action .lead{color:var(--gold);font-weight:700;font-family:"Shippori Mincho B1",serif;margin-right:4px}

  /* CTA */
  .cta{background:linear-gradient(135deg,#3a3550,#2c2a3a);color:#fff;border-radius:22px;padding:30px 24px;margin:22px 0;text-align:center;position:relative;overflow:hidden}
  .cta::before{content:"";position:absolute;inset:0;background:radial-gradient(600px 200px at 70% 0,rgba(216,192,138,.28),transparent)}
  .cta h3{font-family:"Shippori Mincho B1",serif;font-size:1.2rem;margin-bottom:8px;position:relative}
  .cta p{font-size:.9rem;color:#e9e4d6;margin-bottom:18px;position:relative}
  .cta a{position:relative;display:inline-block;text-decoration:none;font-family:"Shippori Mincho B1",serif;font-weight:700;letter-spacing:.06em;color:#3a2f12;background:linear-gradient(135deg,#ecce82,#caa75c);padding:14px 30px;border-radius:999px;box-shadow:0 12px 26px -10px rgba(0,0,0,.5)}
  .share{display:flex;gap:10px;justify-content:center;margin:10px 0 4px}
  .share a{text-decoration:none;font-size:.85rem;font-weight:700;color:var(--ink);border:1px solid var(--line);background:#fffdf8;padding:11px 20px;border-radius:999px}
  .retry{display:block;margin:14px auto 0;background:none;border:none;color:var(--ink-soft);font-family:inherit;font-size:.85rem;text-decoration:underline;cursor:pointer}

  /* FOOTER */
  footer{text-align:center;padding:44px 0 60px;color:var(--ink-soft);font-size:.74rem}
  footer .sep{width:40px;height:1px;background:var(--gold-soft);margin:0 auto 22px}
  footer a{color:var(--ink-soft)}
  .disclaimer{max-width:32em;margin:0 auto 16px;line-height:1.7}

  @media(max-width:480px){
    .portrait{width:168px;height:168px}
    .card{padding:28px 18px}
  }
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <svg class="crest" viewBox="0 0 100 100" fill="none" stroke="#bd9a4e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M50 22c-7 10-22 9-30 4 6 12 2 24-8 30 12 2 19 13 19 26 5-9 14-12 19-12s14 3 19 12c0-13 7-24 19-26-10-6-14-18-8-30-8 5-23 6-30-4z"/>
      <circle cx="50" cy="50" r="4" fill="#bd9a4e" stroke="none"/>
    </svg>
    <span class="eyebrow">守り鳥占い ― 金運編</span>
    <h1 class="title">あなたを守る<br><span class="accent">金運の鳥</span>は？</h1>
    <p class="lede">生年月日とお名前から、あなたを守り導く一羽がわかります。マヤ暦をもとに、あなたの金運の本質をそっと読み解きます。</p>
  </div>
</header>

<main class="wrap">
  <section class="card" id="formCard">
    <div class="form-title">無料・あなたの守り鳥診断</div>
    <div class="form-sub">入力された情報はどこにも保存されません</div>

    <div class="field">
      <label for="y">生年月日</label>
      <div class="dob">
        <select id="y" aria-label="年"></select>
        <select id="m" aria-label="月"></select>
        <select id="d" aria-label="日"></select>
      </div>
    </div>

    <div class="field">
      <label for="name">お名前（漢字のお名前で、より正確に占えます）</label>
      <input type="text" id="name" placeholder="例：佐藤花子" autocomplete="off">
      <p class="hint">ニックネームでも占えます。お名前は画面の外に送られることはありません。</p>
    </div>

    <button class="go" id="goBtn">守り鳥を占う</button>
  </section>

  <section id="result" aria-live="polite"></section>
</main>

<footer>
  <div class="wrap">
    <div class="sep"></div>
    <p class="disclaimer">本診断は娯楽を目的としたものでございます。結果は楽しみのひとつとしてお受け取りください。入力された生年月日・お名前は端末内で計算されるのみで、当サイトに送信・保存されることは一切ございません。</p>
    <p>© 守り鳥占い ／ <a href="about.html">運営者情報</a>・<a href="privacy.html">プライバシーポリシー</a></p>
  </div>
</footer>

<script>
/* ============================================================
   守り鳥占い・金運編  診断エンジン
   - 生年月日 → マヤ暦KIN → 太陽の紋章(1-20) → 鳥×色（正確）
   - お名前  → 総画数の偶奇 → サブ傾向（※画数表は暫定版。
                正確を期す場合は姓名判断用の画数辞書に差し替えてください）
   ============================================================ */

/* ---- KIN計算：基準日 2026年8月27日 = KIN1（検算済み） ---- */
function calcKin(y, m, d){
  const birth  = Date.UTC(y, m - 1, d);
  const anchor = Date.UTC(2026, 7, 27);          // 2026/8/27 = KIN1
  const D = Math.round((birth - anchor) / 86400000);
  return (((D % 260) + 260) % 260) + 1;          // 1〜260
}
function monNumber(kin){ return ((kin - 1) % 20) + 1; }  // 太陽の紋章 1〜20

/* ---- 色テーマ ---- */
const COLORS = {
  赤:{key:"aka",  hex:"#c0473f", grad:"linear-gradient(135deg,#d35a4e,#a23a35)"},
  白:{key:"shiro",hex:"#9c8f72", grad:"linear-gradient(135deg,#c9bda0,#8d8068)"},
  青:{key:"ao",   hex:"#3f6f8c", grad:"linear-gradient(135deg,#4f86a6,#335a73)"},
  黄:{key:"ki",   hex:"#bd9a4e", grad:"linear-gradient(135deg,#dcb85d,#b08a36)"}
};
const BIRD_KEY = {鳳凰:"houou",フクロウ:"fukurou",鷹:"taka",孔雀:"kujaku",カナリア:"kanaria"};
const LABEL = {鳳凰:"一発逆転型",フクロウ:"堅実蓄財型",鷹:"攻めの収入拡大型",孔雀:"豊かさ引き寄せ型",カナリア:"コツコツ副業型"};

const ACTION = {
  鳳凰:"今日は、過去の失敗を一つだけ手放してみましょう。新しい流れはそこから始まります。",
  フクロウ:"今日は、貯金や残高をそっと眺めてみましょう。積み上げを実感することが第一歩です。",
  鷹:"今日は、気になっていた挑戦を一つ調べてみましょう。動き出す準備が運を引き寄せます。",
  孔雀:"今日は、自分の好きなところを一つ声に出して認めてみましょう。輝きが豊かさを呼びます。",
  カナリア:"今日は、小さくできる副収入の種を一つ書き出してみましょう。続けられる一歩が実ります。"
};
const GUARDIAN = {
  鳳凰:"どんなに落ち込んでも、あなたの運は必ずまた昇ります。その時まで、私が見守ります。",
  フクロウ:"あなたが積み上げてきたものは、ちゃんと残っています。焦らなくて大丈夫、私が静かに守ります。",
  鷹:"あなたには好機を見抜く目があります。踏み出すその一歩を、私が後ろから支えます。",
  孔雀:"あなたの魅力が、豊かさを呼び込みます。その輝きを、私がそばで守ります。",
  カナリア:"小さな一歩は、いつか必ず実ります。あなたの地道さを、私が見届けます。"
};
const SUB = {
  odd :"お名前から見るあなたは、お金を動かして増やす〈攻め〉のタイプ。流れを止めず巡らせることで、金運が大きく開きます。",
  even:"お名前から見るあなたは、お金を守り整える〈堅実〉のタイプ。土台を固めるほどに、安心とともに金運が育ちます。"
};

/* ---- 20タイプ：太陽の紋章(1-20) → 鳥×色・特徴・メイン結果 ---- */
const TYPES = {
  1 :{bird:"フクロウ",color:"赤",feat:["浪費しないのにお金が貯まらず焦っている","計画的にお金を扱える力を持っている","一歩踏み出せば着実に増えていく"],main:"堅実に築く力を持つあなた。今こそ動き出せば、蓄える土台が確かに育っていきます。"},
  2 :{bird:"カナリア",color:"白",feat:["好きを仕事にしていいのか迷っている","人を和ませ繋がりを作るのが上手い","好きを整えると収入の種になる"],main:"人を和ませる才能の持ち主。好きなことを整えていくほど、それが収入の種に変わります。"},
  3 :{bird:"フクロウ",color:"青",feat:["自分のお金の使い方に自信がない","学んで賢く選べる知恵を持っている","知識が増えるほど金運が安定する"],main:"学びを富に変える人。知識を増やすほどに、あなたの金運は静かに安定していきます。"},
  4 :{bird:"カナリア",color:"黄",feat:["地道な努力が報われない気がして焦る","コツコツ積み上げを継続できる粘りがある","小さな積み重ねが確かな実りになる"],main:"継続の粘りを持つあなた。小さな積み重ねが、やがて確かな実りとなって返ってきます。"},
  5 :{bird:"鷹",color:"赤",feat:["もっと稼げるはずと内心くすぶっている","好機を見抜く鋭い目を持っている","動き出せば収入は大きく伸びる"],main:"好機を掴む眼を持つあなた。今こそ攻めに転じれば、収入は大きく伸びていきます。"},
  6 :{bird:"鳳凰",color:"白",feat:["過去の失敗を一人で抱えがち","静かに再起の準備をしている","心が整うとお金の流れも戻ってくる"],main:"再生の力を秘めたあなた。心を整えるほどに、一度失った流れが静かに戻ってきます。"},
  7 :{bird:"カナリア",color:"青",feat:["今のままでいいのか漠然と不安になる","工夫して新しい稼ぎ方を見つける力がある","小さな挑戦が思わぬ収入に変わる"],main:"工夫で道を拓く人。ささやかな挑戦が、思いがけない実りへとつながっていきます。"},
  8 :{bird:"孔雀",color:"黄",feat:["認められたい気持ちを抑え込んでいる","努力と魅力で実を引き寄せる力がある","輝くほどにお金とご縁が実る"],main:"輝きで実を引き寄せる人。あなたが輝けば輝くほど、お金とご縁がともに実ります。"},
  9 :{bird:"鳳凰",color:"赤",feat:["人生で大きな挫折を経験している","何度でも立ち上がる","なぜか最後は助かる"],main:"どん底からの逆転劇が、あなたの物語。今は動き出すことで、運が大きく燃え上がる時です。"},
  10:{bird:"フクロウ",color:"白",feat:["将来のお金のことが頭から離れない","堅実に守る力は誰よりも強い","整えるほど安心とお金が貯まっていく"],main:"守る知恵に長けたあなた。暮らしを整えるほどに、安心とお金が静かに積み上がります。"},
  11:{bird:"孔雀",color:"青",feat:["周りと比べて落ち込みやすい","唯一無二の個性で人を魅了する力がある","ありのままを見せると豊かさが流れ込む"],main:"唯一無二の個性が宝。ありのままを見せられたとき、豊かさはあなたへ流れ込みます。"},
  12:{bird:"フクロウ",color:"黄",feat:["コツコツやっても結果が見えず焦る","積み上げを最後までやり切れる粘り強さがある","貯めた分は確実に実りになる"],main:"コツコツの達人。あなたが積み上げた分は、必ず確かな実りとなって返ってきます。"},
  13:{bird:"カナリア",color:"赤",feat:["何か始めたいのに一歩を踏み出せない","小さなことを楽しみながら続けられる","始めた一歩が副収入に育つ"],main:"小さな一歩を楽しめる人。今そっと蒔いた種が、やがて副収入へと育っていきます。"},
  14:{bird:"孔雀",color:"白",feat:["人に尽くしすぎて自分が後回しになる","場を明るくする美しい魅力がある","自分を大切にするほど運が開く"],main:"美しい魅力で運を開く人。自分を大切にするほどに、ご縁とお金が巡りはじめます。"},
  15:{bird:"鷹",color:"青",feat:["今の収入に満足できず停滞を感じている","流れを読んで攻め時を掴む才能がある","一度の決断で収入の桁が変わる"],main:"流れを読む才能の持ち主。変化の波に乗れたとき、収入の桁そのものが変わります。"},
  16:{bird:"鷹",color:"黄",feat:["努力の割に評価されていない気がしている","狙った好機を逃さない実力を持っている","攻めた分だけ確かな実りが返る"],main:"狙いを外さない実力者。あなたが攻めた分だけ、確かな実りが手元に返ってきます。"},

/* ---- 画数：暫定テーブル（要・正式な画数辞書への差し替え）---- */
const KANA = {あ:3,い:2,う:2,え:3,お:4,か:3,き:4,く:1,け:3,こ:2,さ:3,し:1,す:2,せ:3,そ:3,た:4,ち:3,つ:1,て:1,と:2,な:5,に:3,ぬ:4,ね:4,の:1,は:4,ひ:2,ふ:4,へ:1,ほ:5,ま:3,み:3,む:4,め:2,も:3,や:3,ゆ:3,よ:3,ら:2,り:2,る:2,れ:2,ろ:3,わ:3,を:4,ん:2,
  ア:2,イ:2,ウ:3,エ:3,オ:4,カ:2,キ:3,ク:2,ケ:3,コ:2,サ:3,シ:3,ス:2,セ:2,ソ:2,タ:3,チ:3,ツ:3,テ:3,ト:2,ナ:2,ニ:2,ヌ:2,ネ:4,ノ:1,ハ:2,ヒ:2,フ:1,ヘ:1,ホ:4,マ:2,ミ:3,ム:2,メ:2,モ:3,ヤ:2,ユ:2,ヨ:3,ラ:2,リ:2,ル:2,レ:1,ロ:3,ワ:2,ヲ:3,ン:2,ー:1};
const KANJI = {一:1,二:2,三:3,四:5,五:4,六:4,七:2,八:2,九:2,十:2,子:3,木:4,本:5,田:5,中:4,山:3,川:3,大:3,小:3,
  花:7,香:9,美:9,佐:7,藤:18,鈴:13,高:10,橋:16,渡:12,辺:5,伊:6,加:5,斎:11,菅:11,松:8,井:4,林:8,森:12,村:7,
  里:7,奈:8,愛:13,結:12,陽:12,菜:11,優:17,翔:12,太:4,郎:9,輝:15};

function strokes(name){
  let total = 0;
  for(const ch of name){
    if(KANA[ch] !== undefined)      total += KANA[ch];
    else if(KANJI[ch] !== undefined) total += KANJI[ch];
    else                             total += 1;   // 未知の文字の暫定値
  }
  return total;
}

/* ---- セレクト初期化 ---- */
(function initSelects(){
  const y=document.getElementById('y'),m=document.getElementById('m'),d=document.getElementById('d');
  const now=new Date().getFullYear();
  y.innerHTML='<option value="">年</option>';
  for(let i=now;i>=1930;i--) y.insertAdjacentHTML('beforeend',`<option value="${i}">${i}年</option>`);
  m.innerHTML='<option value="">月</option>';
  for(let i=1;i<=12;i++) m.insertAdjacentHTML('beforeend',`<option value="${i}">${i}月</option>`);
  d.innerHTML='<option value="">日</option>';
  for(let i=1;i<=31;i++) d.insertAdjacentHTML('beforeend',`<option value="${i}">${i}日</option>`);
})();
